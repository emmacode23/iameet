<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Meet - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand font-weight-bold" href="#">IA Meet</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Bonjour, <span sec:authentication="name">Utilisateur</span></a></li>
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="btn btn-link nav-link">Déconnexion</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-12">
                <div class="card shadow-sm p-4">
                    <h2>Tableau de bord</h2>
                    <p class="text-muted">Gérez vos réunions et traductions.</p>
                    
                    <div class="row mt-4">
                        <div class="col-md-6 mb-4">
                            <div class="card h-100 bg-white shadow-sm border-0">
                                <div class="card-body text-center p-5">
                                    <h5 class="card-title">Lancer une réunion</h5>
                                    <p class="card-text">Créez un nouvel espace de visioconférence instantanément.</p>
                                    <form th:action="@{/meet/create}" method="post">
                                        <button type="submit" class="btn btn-primary btn-lg mt-3">Nouvelle réunion</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6 mb-4">
                            <div class="card h-100 bg-white shadow-sm border-0">
                                <div class="card-body text-center p-5">
                                    <h5 class="card-title">Rejoindre une réunion</h5>
                                    <p class="card-text">Entrez l'identifiant d'une réunion existante.</p>
                                    <div class="input-group mt-3">
                                        <input type="text" id="roomIdInput" class="form-control" placeholder="ID de la réunion">
                                        <button class="btn btn-outline-primary" type="button" onclick="joinMeeting()">Rejoindre</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function joinMeeting() {
            const roomId = document.getElementById('roomIdInput').value;
            if (roomId) {
                window.location.href = '/meet/' + roomId;
            } else {
                alert('Veuillez entrer un ID de réunion.');
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
