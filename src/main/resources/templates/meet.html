<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Meet - Réunion & Traduction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body, html { height: 100%; margin: 0; background-color: #202124; color: white; }
        .main-container { display: flex; height: calc(100% - 80px); }
        .video-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; padding: 20px; overflow-y: auto; }
        .video-card { background: #3c4043; border-radius: 8px; position: relative; overflow: hidden; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .chat-sidebar { width: 350px; background: white; color: black; display: flex; flex-direction: column; border-left: 1px solid #ddd; }
        .chat-header { padding: 15px; border-bottom: 1px solid #ddd; font-weight: bold; background: #f8f9fa; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-input { padding: 15px; border-top: 1px solid #ddd; }
        .controls-bar { height: 80px; background: #202124; display: flex; align-items: center; justify-content: center; gap: 20px; border-top: 1px solid #3c4043; }
        .control-btn { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; font-size: 20px; transition: 0.2s; }
        .btn-mute { background: #3c4043; color: white; }
        .btn-mute.active { background: #ea4335; }
        .btn-cam { background: #3c4043; color: white; }
        .btn-cam.active { background: #ea4335; }
        .btn-hangup { background: #ea4335; color: white; width: 60px; }
        .badge-room { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; font-size: 12px; z-index: 10; }
        .message-item { padding: 8px 12px; border-radius: 10px; max-width: 85%; font-size: 0.9rem; }
        .msg-me { align-self: flex-end; background: #e3f2fd; border: 1px solid #cce5ff; }
        .msg-other { align-self: flex-start; background: #f1f3f4; border: 1px solid #ddd; }
        .msg-system { align-self: center; background: transparent; color: #70757a; font-style: italic; font-size: 0.8rem; }
        .translation-panel { padding: 10px; border-bottom: 1px solid #ddd; background: #fff3e0; }
    </style>
</head>
<body>
    <div class="badge-room">
        ID Réunion: <span th:text="${roomId}"></span>
    </div>

    <div class="main-container">
        <div class="video-grid" id="videoGrid">
            <div class="video-card" id="localVideoContainer">
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="badge-room" style="bottom: 10px; top: auto;">Vous</div>
            </div>
        </div>

        <div class="chat-sidebar" id="chatSidebar">
            <div class="chat-header">Options & Chat</div>
            
            <!-- Panel de Traduction -->
            <div class="translation-panel">
                <div class="mb-2">
                    <label class="form-label small fw-bold mb-1">Ma langue</label>
                    <select id="sourceLang" class="form-select form-select-sm">
                        <option value="fr-FR">Français</option>
                        <option value="en-US">Anglais</option>
                        <option value="es-ES">Espagnol</option>
                    </select>
                </div>
                <div class="mb-2">
                    <label class="form-label small fw-bold mb-1">Traduire en</label>
                    <select id="targetLang" class="form-select form-select-sm">
                        <option value="en">Anglais</option>
                        <option value="fr">Français</option>
                        <option value="es">Espagnol</option>
                    </select>
                </div>
                <button id="toggleTranslation" class="btn btn-warning btn-sm w-100">
                    <i class="bi bi-translate"></i> Activer Traduction IA
                </button>
            </div>

            <div id="chatMessages" class="chat-messages">
                <!-- Messages -->
            </div>
            <div class="chat-input">
                <form id="chatForm" class="d-flex">
                    <input type="text" id="messageInput" class="form-control me-2" placeholder="Message..." autocomplete="off">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-send-fill"></i></button>
                </form>
            </div>
        </div>
    </div>

    <div class="controls-bar">
        <button id="toggleMic" class="control-btn btn-mute"><i class="bi bi-mic-fill"></i></button>
        <button id="toggleCam" class="control-btn btn-cam"><i class="bi bi-camera-video-fill"></i></button>
        <button id="shareScreen" class="control-btn btn-mute"><i class="bi bi-display"></i></button>
        <a th:href="@{/dashboard}" class="control-btn btn-hangup"><i class="bi bi-telephone-x-fill"></i></a>
    </div>

    <script th:inline="javascript">
        const ROOM_ID = [[${roomId}]];
        const AUTH_USER = [[${#authentication.name}]];
        const USERNAME = (AUTH_USER && AUTH_USER !== 'anonymousUser') ? AUTH_USER : 'Invite_' + Math.floor(Math.random() * 100);
        
        let localStream;
        let myPeer;
        const peers = {};
        let stompClient = null;

        // Variables pour la traduction
        let mediaRecorder;
        let isTranslating = false;
        let translationInterval;

        const videoGrid = document.getElementById('videoGrid');
        const localVideo = document.getElementById('localVideo');
        const chatForm = document.getElementById('chatForm');
        const messageInput = document.getElementById('messageInput');
        const chatMessages = document.getElementById('chatMessages');

        function connectWebSocket() {
            const socket = new SockJS('/ws/chat');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;

            stompClient.connect({}, function (frame) {
                stompClient.subscribe('/topic/' + ROOM_ID, function (messageOutput) {
                    const message = JSON.parse(messageOutput.body);
                    handleIncomingMessage(message);
                });

                stompClient.send("/app/chat.addUser", {}, JSON.stringify({
                    roomId: ROOM_ID, sender: USERNAME, type: 'JOIN'
                }));

                initMedia();
            });
        }

        function initMedia() {
            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                .then(stream => {
                    localStream = stream;
                    localVideo.srcObject = stream;
                    setupPeer();
                })
                .catch(err => {
                    console.error('Erreur accès média:', err);
                    alert('Erreur d\'accès à la caméra/micro.');
                });
        }

        function setupPeer() {
            myPeer = new Peer(undefined, { debug: 1 });
            myPeer.on('open', id => {
                if(stompClient && stompClient.connected) {
                    stompClient.send("/app/chat.peer", {}, JSON.stringify({
                        roomId: ROOM_ID, sender: USERNAME, content: id, type: 'PEER_ID'
                    }));
                }
            });
            myPeer.on('call', call => {
                call.answer(localStream);
                const video = document.createElement('video');
                call.on('stream', userStream => addVideoStream(video, userStream, call.peer));
            });
        }

        // --- LOGIQUE DE TRADUCTION ---

        document.getElementById('toggleTranslation').onclick = function() {
            if (!isTranslating) {
                startTranslation();
                this.innerHTML = '<i class="bi bi-stop-circle"></i> Arrêter Traduction';
                this.classList.replace('btn-warning', 'btn-danger');
            } else {
                stopTranslation();
                this.innerHTML = '<i class="bi bi-translate"></i> Activer Traduction IA';
                this.classList.replace('btn-danger', 'btn-warning');
            }
            isTranslating = !isTranslating;
        };

        function startTranslation() {
            const sourceLang = document.getElementById('sourceLang').value;
            const targetLang = document.getElementById('targetLang').value;

            // On enregistre par morceaux de 3 secondes
            mediaRecorder = new MediaRecorder(localStream);
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    sendAudioToTranslate(event.data, sourceLang, targetLang);
                }
            };

            translationInterval = setInterval(() => {
                mediaRecorder.stop();
                mediaRecorder.start();
            }, 3000);

            mediaRecorder.start();
            appendMessage('Système', 'Traduction activée...', false, 'system');
        }

        function stopTranslation() {
            clearInterval(translationInterval);
            if (mediaRecorder) mediaRecorder.stop();
            appendMessage('Système', 'Traduction désactivée.', false, 'system');
        }

        async function sendAudioToTranslate(audioBlob, sourceLang, targetLang) {
            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = async () => {
                const base64Audio = reader.result.split(',')[1];
                
                try {
                    const response = await fetch('/api/translate/audio', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            audio: base64Audio,
                            sourceLang: sourceLang,
                            targetLang: targetLang
                        })
                    });

                    const data = await response.json();
                    if (data.original) {
                        // Afficher dans le chat
                        appendMessage('IA (Original)', data.original, true, 'chat');
                        appendMessage('IA (Traduit)', data.translated, false, 'chat');
                        
                        // Envoyer aux autres via WebSocket
                        stompClient.send("/app/chat.sendMessage", {}, JSON.stringify({
                            roomId: ROOM_ID,
                            sender: 'Traducteur IA',
                            content: `[${sourceLang} -> ${targetLang}] : ${data.translated}`,
                            type: 'CHAT'
                        }));

                        // Jouer l'audio traduit
                        if (data.audio) {
                            const audio = new Audio("data:audio/wav;base64," + data.audio);
                            audio.play();
                        }
                    }
                } catch (error) {
                    console.error('Erreur traduction:', error);
                }
            };
        }

        // --- FIN LOGIQUE TRADUCTION ---

        function handleIncomingMessage(message) {
            if (message.type === 'CHAT') {
                appendMessage(message.sender, message.content, message.sender === USERNAME, 'chat');
            } else if (message.type === 'JOIN') {
                appendMessage('Système', message.content, false, 'system');
                if (message.sender !== USERNAME && myPeer && myPeer.id) {
                    setTimeout(() => {
                        stompClient.send("/app/chat.peer", {}, JSON.stringify({
                            roomId: ROOM_ID, sender: USERNAME, content: myPeer.id, type: 'PEER_ID'
                        }));
                    }, 1000);
                }
            } else if (message.type === 'PEER_ID' && message.sender !== USERNAME) {
                connectToNewUser(message.content, localStream);
            }
        }

        function connectToNewUser(remotePeerId, stream) {
            if (peers[remotePeerId]) return;
            const call = myPeer.call(remotePeerId, stream);
            const video = document.createElement('video');
            call.on('stream', userStream => addVideoStream(video, userStream, remotePeerId));
            peers[remotePeerId] = { call: call, video: video };
        }

        function addVideoStream(video, stream, peerId) {
            if (document.getElementById('container-' + peerId)) return;
            const container = document.createElement('div');
            container.className = 'video-card';
            container.id = 'container-' + peerId;
            video.srcObject = stream;
            video.playsinline = true;
            video.addEventListener('loadedmetadata', () => video.play());
            container.append(video);
            videoGrid.append(container);
        }

        function appendMessage(user, text, isMe, type) {
            const div = document.createElement('div');
            div.className = 'message-item ' + (type === 'system' ? 'msg-system' : (isMe ? 'msg-me' : 'msg-other'));
            div.innerHTML = type === 'system' ? text : `<strong>${user.split('@')[0]}:</strong> ${text}`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        chatForm.onsubmit = (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (text && stompClient) {
                stompClient.send("/app/chat.sendMessage", {}, JSON.stringify({
                    roomId: ROOM_ID, sender: USERNAME, content: text, type: 'CHAT'
                }));
                messageInput.value = '';
            }
        };

        document.getElementById('toggleMic').onclick = function() {
            const enabled = localStream.getAudioTracks()[0].enabled;
            localStream.getAudioTracks()[0].enabled = !enabled;
            this.classList.toggle('active', enabled);
            this.innerHTML = enabled ? '<i class="bi bi-mic-mute-fill"></i>' : '<i class="bi bi-mic-fill"></i>';
        };
        document.getElementById('toggleCam').onclick = function() {
            const enabled = localStream.getVideoTracks()[0].enabled;
            localStream.getVideoTracks()[0].enabled = !enabled;
            this.classList.toggle('active', enabled);
            this.innerHTML = enabled ? '<i class="bi bi-camera-video-off-fill"></i>' : '<i class="bi bi-camera-video-fill"></i>';
        };

        connectWebSocket();
    </script>
</body>
</html>
