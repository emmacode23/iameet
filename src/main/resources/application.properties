spring.application.name=ia-meet

# Configuration Réseau Railway
server.port=${PORT:8080}
server.address=0.0.0.0

# Base de données robuste
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:ia_meet}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:assamoi}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Prévention des crashs au démarrage
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.initialization-fail-timeout=0

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Thymeleaf (Forçage des chemins)
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.check-template-location=true

# Logs plus précis pour diagnostiquer le problème sur Railway
logging.level.org.springframework.web=INFO
logging.level.com.iaapp.ia_meet=DEBUG
