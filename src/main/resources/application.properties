spring.application.name=ia-meet

# Configuration du Port (Dynamique pour le Cloud, 8080 par défaut en local)
server.port=${PORT:8080}

# Base de données MySQL (Variables d'environnement pour le Cloud, valeurs locales par défaut)
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/ia_meet?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:assamoi}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Gestion des fichiers (Upload)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
